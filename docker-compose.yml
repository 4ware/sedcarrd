services:
  db:
    image: postgres
    restart: always
    user: postgres
    volumes:
      - ./db-data:/var/lib/postgresql
    environment:
      - POSTGRES_DB=sedcarrd
      - POSTGRES_PASSWORD=password
      - POSTGRES_USER=sedcarrd
    expose:
      - 5432
    healthcheck:
      test: ["CMD", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
